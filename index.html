<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Horizontal</title>
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family:sans-serif;
}

/* Section */
section{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
position:relative;
text-align:center;
}

/* Next Button */
button{
padding:12px 28px;
border:none;
border-radius:30px;
background:#ff2ea6;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px #ff2ea6;
}

/* Next button horizontal bottom center */
.next{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
z-index:20;
}

/* Video */
video{
width:90%;
max-width:500px;
border-radius:15px;
transform:rotate(0deg); /* horizontal fixed */
}

/* Canvas */
canvas{
width:100%;
height:60vh;
}

/* Photo Gallery */
.gallery{
position:relative;
width:250px;
height:250px;
transform-style:preserve-3d;
animation:rotate 18s linear infinite;
margin-top:50px;
}
.gallery img{
position:absolute;
width:160px;
height:160px;
object-fit:cover;
border-radius:15px;
left:45px;
top:45px;
}

@keyframes rotate{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

h1{font-size:40px;}
h2{font-size:32px;}
</style>
</head>

<body>

<!-- SECTION 1 -->
<section id="sec1">
<h1>Hey Wait 💖</h1>
<button onclick="showSection(2)">Next ➜</button>
</section>

<!-- SECTION 2 VIDEO -->
<section id="sec2" style="display:none">
<video id="video" src="video.mp4" autoplay></video>
</section>

<!-- SECTION 3 BIRTHDAY ANIMATION -->
<section id="sec3" style="display:none">
<canvas id="canvas"></canvas>
<button class="next" onclick="showSection(4)">Next ➜</button>
</section>

<!-- SECTION 4 WISHES -->
<section id="sec4" style="display:none">
<h2>Best Wishes 💖</h2>
<p style="padding:20px">
May your day be filled with happiness, laughter and love.<br>
You deserve all the best moments in life.
</p>
<button class="next" onclick="showSection(5)">Next ➜</button>
</section>

<!-- SECTION 5 PHOTOS -->
<section id="sec5" style="display:none">
<h2>Happiest Birthday 🎉</h2>
<audio id="song" src="song.mp3"></audio>
<div class="gallery">
<img src="p1.jpg" style="transform:rotateY(0deg) translateZ(250px)">
<img src="p2.jpg" style="transform:rotateY(45deg) translateZ(250px)">
<img src="p3.jpg" style="transform:rotateY(90deg) translateZ(250px)">
<img src="p4.jpg" style="transform:rotateY(135deg) translateZ(250px)">
<img src="p5.jpg" style="transform:rotateY(180deg) translateZ(250px)">
<img src="p6.jpg" style="transform:rotateY(225deg) translateZ(250px)">
<img src="p7.jpg" style="transform:rotateY(270deg) translateZ(250px)">
<img src="p8.jpg" style="transform:rotateY(315deg) translateZ(250px)">
</div>
<button class="next" onclick="showSection(6)">Next ➜</button>
</section>

<!-- SECTION 6 FINAL -->
<section id="sec6" style="display:none">
<h1>HAPPY BIRTHDAY</h1>
<h2>ONCE AGAIN</h2>
<h1>MY CRIME PARTNER ❤️</h1>
</section>

<script>
// Section Control
function showSection(n){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById("sec"+n).style.display="flex"

// Video auto play
let video=document.getElementById("video")
if(n==2){
video.play()
video.onended=function(){ showSection(3); startAnimation() }
}

// Song autoplay
let song=document.getElementById("song")
if(n==5){ song.play() }else{ song.pause(); song.currentTime=0 }
}

/* Horizontal Birthday Dots Animation (no rotation) */
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")
canvas.width = window.innerWidth
canvas.height = window.innerHeight*0.6

let particles = []
let texts = ["Happy Birthday","To My Crime Partner"]

function createText(text){
    particles=[]
    ctx.clearRect(0,0,canvas.width,canvas.height)

    let size = text === "To My Crime Partner" ? 50 : 80
    ctx.font = "bold "+size+"px Arial"
    ctx.textAlign = "center"
    ctx.fillStyle = "white"
    ctx.fillText(text, canvas.width/2, canvas.height/2)

    let data = ctx.getImageData(0,0,canvas.width,canvas.height).data

    for(let y=0;y<canvas.height;y+=4){
        for(let x=0;x<canvas.width;x+=4){
            let index = (y*canvas.width + x)*4
            if(data[index+3]>150){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: -Math.random()*canvas.height,
                    tx: x,
                    ty: y,
                    speed: 3 + Math.random()*2
                })
            }
        }
    }
    ctx.clearRect(0,0,canvas.width,canvas.height)
}

function animateText(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    particles.forEach(p=>{
        p.x += (p.tx - p.x)*0.05
        p.y += (p.ty - p.y)*0.05
        ctx.fillStyle="#ff4da6"
        ctx.shadowBlur=15
        ctx.shadowColor="#ff4da6"
        ctx.beginPath()
        ctx.arc(p.x,p.y,2,0,Math.PI*2)
        ctx.fill()
    })
    requestAnimationFrame(animateText)
}

function startAnimation(){
    createText(texts[0])
    animateText()
    setTimeout(()=>{ createText(texts[1]); }, 4200)
}
</script>
</body>
</html>
